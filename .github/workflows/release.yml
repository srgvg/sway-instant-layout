# To re-enable PyPI publishing:
#   1. Uncomment the 'release' trigger in the 'on:' block below.
#   2. Remove the 'if: false' line from the upload_pypi job.
#   3. Add a PyPI API token to GitHub repo Settings → Secrets → Actions
#      as a secret named 'pypi_password'.
#   4. Create a GitHub Release to trigger the workflow.

name: build

on:
    push:
    # Uncomment to trigger on GitHub Releases:
    # release:
    #   types:
    #     - published


jobs:
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v2
        name: Install Python
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools

      - name: Build sdist
        run: python setup.py sdist

      - uses: actions/upload-artifact@v4
        with:
          path: dist/*.tar.gz


  upload_pypi:
    needs: [build_sdist]
    runs-on: ubuntu-latest
    # Disabled until the project is published on PyPI.
    # To re-enable: remove the 'if: false' line and uncomment the release trigger above.
    if: false
    # if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: artifact
          path: dist

      - uses: pypa/gh-action-pypi-publish@master
        with:
          user: __token__
          password: ${{ secrets.pypi_password }}
          # To test against TestPyPI first:
          # repository_url: https://test.pypi.org/legacy/
